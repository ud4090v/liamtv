plugins {
    id 'com.android.application'
}

android {
    namespace 'com.liamtv.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.liamtv.app"
        minSdk 21
        targetSdk 34
        versionCode 5
        versionName "1.5"

        // Set your site URL here
        buildConfigField "String", "TV_PLAYER_URL", "\"https://liamtv.vercel.app/tv-player.html\""
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.leanback:leanback:1.0.0'
}
